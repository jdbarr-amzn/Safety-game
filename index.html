<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Hero - Workplace Safety Platformer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
#game-container { position: relative; width: 832px; height: 468px; border: 3px solid #e94560; border-radius: 8px; overflow: hidden; }
canvas { display: block; }
#hud { display: none; }
.overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(22, 33, 62, 0.95); color: #fff; z-index: 20;
}
.overlay.hidden { display: none; }
.overlay h1 { font-size: 48px; margin-bottom: 10px; }
.overlay h2 { font-size: 28px; margin-bottom: 20px; text-align: center; padding: 0 20px; }
.overlay p { font-size: 18px; margin-bottom: 20px; text-align: center; padding: 0 30px; color: #ccc; }
input { padding: 10px 20px; font-size: 18px; border: 2px solid #e94560; border-radius: 6px; background: #0f3460; color: #fff; text-align: center; margin-bottom: 15px; outline: none; }
input::placeholder { color: #888; }
button { padding: 12px 30px; font-size: 18px; border: none; border-radius: 6px; cursor: pointer; margin: 5px; background: #e94560; color: #fff; font-weight: bold; transition: background 0.2s; }
button:hover { background: #c73652; }
#answers { display: flex; flex-direction: column; gap: 10px; width: 80%; max-width: 500px; }
#answers button { text-align: left; padding: 12px 20px; background: #0f3460; border: 2px solid #533483; }
#answers button:hover { background: #533483; }
.correct { background: #2ecc71 !important; border-color: #27ae60 !important; }
.wrong { background: #e74c3c !important; border-color: #c0392b !important; }
#leaderboard-list { list-style: none; padding: 0; width: 70%; max-width: 400px; margin: 0 auto 10px auto; }
#leaderboard-list li { padding: 5px 16px; margin: 3px 0; background: #0f3460; border-radius: 4px; display: flex; justify-content: space-between; font-size: 14px; }
#leaderboard-list li:nth-child(-n+3) { background: #533483; }
#leaderboard-screen.overlay { justify-content: flex-start; padding-top: 20px; overflow-y: auto; }
#leaderboard-screen h2 { margin-bottom: 10px; flex-shrink: 0; }
#leaderboard-screen button { flex-shrink: 0; margin-top: 10px; }
#effects { position: absolute; top: 40px; left: 10px; color: #fff; font-size: 14px; pointer-events: none; z-index: 10; }
#controls-legend { display: flex; gap: 16px; margin-bottom: 15px; color: #aaa; font-size: 13px; }
#controls-legend span { background: #0f3460; padding: 5px 12px; border-radius: 4px; }
#menu-screen { background: url('Title screen/Title Background.jpg') center/cover no-repeat !important; }
#splash-screen { background: url('Title screen/Title Background.jpg') center/cover no-repeat !important; }
#splash-img { width: 500px; margin-bottom: 30px; }
#lets-play-btn { background: #2ecc71; color: #000; font-size: 24px; font-weight: bold; border: 3px solid #27ae60; padding: 16px 50px; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
#lets-play-btn:hover { background: #27ae60; color: #fff; }
#title-img { width: 420px; margin-bottom: 0; margin-top: 30px; }
#menu-screen p { color: #fff; font-size: 14px; margin: -8px 0 0 0; padding: 0 30px; text-shadow: 1px 1px 4px #000; }
#menu-screen #controls-legend { margin: 2px 0; }
#menu-screen #controls-legend span { background: rgba(0,0,0,0.7); }
#menu-screen input { border-color: #2ecc71; background: rgba(0,0,0,0.7); margin: 2px 0; }
#menu-buttons { display: flex; gap: 10px; }
#menu-buttons button { background: #2ecc71; color: #000; font-weight: bold; border: 2px solid #27ae60; }
#menu-buttons button:hover { background: #27ae60; color: #fff; }
@keyframes slideInRight { from { transform: translateX(200px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
#menu-man { position: absolute; bottom: 0; right: -60px; height: 320px; pointer-events: none; animation: slideInRight 0.8s ease-out forwards; }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="gameCanvas" width="832" height="468"></canvas>

  <div id="hud" class="hidden">
    <div style="display:flex;flex-direction:column;line-height:1.3"><span id="score-display">Score: 0</span><span id="eswag-display">E-Swag: $0</span></div>
    <span id="lives-display">❤️❤️❤️</span>
    <span id="level-display">Level 1</span>
  </div>
  <div id="effects"></div>

  <div id="splash-screen" class="overlay">
    <img src="Title screen/Safety_Hero_Title_Screen-removebg-preview.png" alt="Safety Hero" id="splash-img">
    <button id="lets-play-btn">Let's Play!</button>
  </div>

  <div id="menu-screen" class="overlay hidden">
    <img src="Title screen/Safety_Hero_Title_Screen-removebg-preview.png" alt="Safety Hero" id="title-img">
    <p>Navigate workplace hazards, answer safety questions, and collect power-ups!</p>
    <div id="controls-legend">
      <span>⬅️➡️ / A D — Move</span>
      <span>⬆️ / W / Space — Jump</span>
      <span>⚠️ Touch signs for safety quiz</span>
    </div>
    <input id="player-name" placeholder="Enter your name" maxlength="15">
    <div id="menu-buttons">
      <button id="start-btn">Start Game</button>
      <button id="leaderboard-btn">Leaderboard</button>
    </div>
    <img src="Title screen/Man_leaning-removebg-preview.png" alt="" id="menu-man">
  </div>

  <div id="question-screen" class="overlay hidden">
    <h2 id="question-text"></h2>
    <div id="answers"></div>
  </div>

  <div id="gameover-screen" class="overlay hidden">
    <h2>Game Over!</h2>
    <p id="final-score"></p>
    <button id="restart-btn">Play Again</button>
    <button id="go-leaderboard-btn">Leaderboard</button>
    <button id="go-menu-btn">Main Menu</button>
  </div>

  <div id="leaderboard-screen" class="overlay hidden">
    <h2>🏆 Leaderboard</h2>
    <ol id="leaderboard-list"></ol>
    <button id="back-btn">Back to Menu</button>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="game.js"></script>
</body>
</html>
